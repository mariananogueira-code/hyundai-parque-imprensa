// ─── Maintenance check (km only, synced with car.km) ───
function getMaintenanceStatus(car) {
  if (car.fuel !== "Gasolina" || car.status === "Inativo") return null;
  const lastSvc = car.lastServiceKm || 0;
  const km = car.km || 0;
  const kmSinceService = km - lastSvc;
  // If maintenance was dismissed at current km level, don't show alert
  if (car.maintDismissedAtKm && car.maintDismissedAtKm >= lastSvc + 9000) return null;
  if (kmSinceService >= 10000) return { type: "danger", msg: `Manutenção ultrapassada — ${(kmSinceService - 10000).toLocaleString("pt-PT")} km acima` };
  if (kmSinceService >= 9000) return { type: "warning", msg: `Manutenção próxima — faltam ${(10000 - kmSinceService).toLocaleString("pt-PT")} km` };
  return null;
}

// Data loaded from Supabase



const db = window.supabaseClient;

async function loadCars() {
  const { data: cars, error } = await db.from('cars').select('*').order('id');
  if (error) { console.error('Load cars error:', error); return []; }
  // Load loans for each car
  const { data: loans, error: le } = await db.from('loans').select('*').order('start_date');
  if (le) { console.error('Load loans error:', le); return cars.map(c => ({...mapCar(c), history: []})); }
  const loansByCarId = {};
  (loans || []).forEach(l => { if (!loansByCarId[l.car_id]) loansByCarId[l.car_id] = []; loansByCarId[l.car_id].push({ borrower: l.borrower, start: l.start_date, end: l.end_date, kmStart: l.km_start, kmEnd: l.km_end, _id: l.id }); });
  return cars.map(c => ({ ...mapCar(c), history: loansByCarId[c.id] || [] }));
}

function mapCar(c) {
  return {
    id: c.id, model: c.model, plate: c.plate, vin: c.vin || '', km: c.km || 0,
    colorExt: c.color_ext || '—', colorInt: c.color_int || '—',
    location: c.location || '', status: c.status || 'Livre',
    fuel: c.fuel || 'Elétrico', registrationDate: c.registration_date || '',
    lastServiceKm: c.last_service_km || 0, maintDismissedAtKm: c.maint_dismissed_at_km,
    borrower: c.borrower || '', borrowStart: c.borrow_start || '', borrowEnd: c.borrow_end || '',
    inactiveDate: c.inactive_date || '', inactiveReason: c.inactive_reason || '',
  };
}

function mapCarToDB(c) {
  return {
    plate: c.plate, model: c.model, vin: c.vin, km: c.km,
    color_ext: c.colorExt, color_int: c.colorInt,
    location: c.location, status: c.status, fuel: c.fuel,
    registration_date: c.registrationDate || null,
    last_service_km: c.lastServiceKm || 0,
    maint_dismissed_at_km: c.maintDismissedAtKm || null,
    borrower: c.borrower || '', borrow_start: c.borrowStart || null,
    borrow_end: c.borrowEnd || null,
    inactive_date: c.inactiveDate || null, inactive_reason: c.inactiveReason || '',
  };
}

async function saveCar(car) {
  const dbCar = mapCarToDB(car);
  if (car.id && car.id > 0) {
    const { error } = await db.from('cars').update(dbCar).eq('id', car.id);
    if (error) console.error('Update car error:', error);
  } else {
    const { data, error } = await db.from('cars').insert(dbCar).select().single();
    if (error) console.error('Insert car error:', error);
    return data ? data.id : null;
  }
  return car.id;
}

async function addLoan(carId, loan) {
  const { error } = await db.from('loans').insert({
    car_id: carId, borrower: loan.borrower,
    start_date: loan.start, end_date: loan.end,
    km_start: loan.kmStart, km_end: loan.kmEnd,
  });
  if (error) console.error('Add loan error:', error);
}

async function loadLocations() {
  const { data, error } = await db.from('locations').select('name').order('name');
  if (error) { console.error('Load locations error:', error); return DEFAULT_LOCATIONS; }
  return data.map(l => l.name);
}

async function saveLocation(name) {
  const { error } = await db.from('locations').insert({ name });
  if (error && !error.message.includes('duplicate')) console.error('Save location error:', error);
}

async function removeLocation(name) {
  const { error } = await db.from('locations').delete().eq('name', name);
  if (error) console.error('Remove location error:', error);
}

async function loadAccessTokens() {
  const { data, error } = await db.from('access_tokens').select('*');
  if (error) { console.error('Load tokens error:', error); return []; }
  return data || [];
}

// ═══ LINK-BASED ACCESS ═══
const ACCESS_TOKENS = { admin: "hpi-admin-2026", editor: "hpi-editor-2026", viewer: "hpi-viewer-2026" };

async function getAccessFromHash() {
  const hash = window.location.hash.replace("#", "");
  if (!hash) return { role: "admin", name: "Admin" }; // Default for direct access
  // Check against Supabase tokens
  const tokens = await loadAccessTokens();
  const match = tokens.find(t => t.token === hash);
  if (match) return { role: match.role, name: match.name };
  // Fallback to hardcoded
  if (hash === ACCESS_TOKENS.admin) return { role: "admin", name: "Admin" };
  if (hash === ACCESS_TOKENS.editor) return { role: "editor", name: "Editor" };
  if (hash === ACCESS_TOKENS.viewer) return { role: "viewer", name: "Viewer" };
  return null;
}

function AccessLinksView({ onBack }) {
  const [copied, setCopied] = useState(null);
  const baseUrl = window.location.origin + window.location.pathname;

  const links = [
    { role: "admin", label: "Admin", desc: "Acesso total: gerir viaturas, importar, definições, utilizadores", color: T.danger, token: ACCESS_TOKENS.admin },
    { role: "editor", label: "Editor", desc: "Criar e editar marcações em carros ativos", color: T.accent, token: ACCESS_TOKENS.editor },
    { role: "viewer", label: "Viewer", desc: "Apenas consulta: ver lista, detalhe, timeline, multas, estatísticas", color: T.textMuted, token: ACCESS_TOKENS.viewer },
  ];

  const copyLink = (token, role) => {
    const url = `${baseUrl}#${token}`;
    navigator.clipboard.writeText(url).then(() => { setCopied(role); setTimeout(() => setCopied(null), 2000); }).catch(() => {});
  };

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: font, padding: "24px 28px" }}>
      <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 8, background: "none", border: "none", color: T.textMuted, fontSize: 13, cursor: "pointer", fontFamily: font, marginBottom: 24, padding: 0 }}><Icon d={Icons.back} size={16} color={T.textMuted} /> Voltar</button>
      <h1 style={{ fontSize: 22, fontWeight: 700, margin: "0 0 8px" }}>Links de Acesso</h1>
      <p style={{ fontSize: 13, color: T.textMuted, margin: "0 0 24px" }}>Partilhe o link correspondente ao nível de acesso pretendido. Cada link dá acesso direto sem password.</p>

      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {links.map(l => (
          <div key={l.role} style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: "20px 24px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <Icon d={Icons.user} size={18} color={l.color} />
              <span style={{ fontSize: 16, fontWeight: 700, color: l.color }}>{l.label}</span>
            </div>
            <p style={{ fontSize: 12, color: T.textMuted, margin: "0 0 14px" }}>{l.desc}</p>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ flex: 1, padding: "8px 12px", background: T.bg, borderRadius: 8, border: `1px solid ${T.border}`, fontFamily: fontMono, fontSize: 12, color: T.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {baseUrl}#{l.token}
              </div>
              <button onClick={() => copyLink(l.token, l.role)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: copied === l.role ? T.free : T.accent, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: font, whiteSpace: "nowrap", transition: "background 0.2s" }}>
                {copied === l.role ? "✓ Copiado" : "Copiar link"}
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══ MAIN ═══
function App() {
  const [user, setUser] = useState(null);
  const [checked, setChecked] = useState(false);

  useEffect(() => {
    getAccessFromHash().then(access => {
      setUser(access || { role: "admin", name: "Admin" });
      setChecked(true);
    });
    const handler = () => { getAccessFromHash().then(a => setUser(a || { role: "admin", name: "Admin" })); };
    window.addEventListener("hashchange", handler);
    return () => window.removeEventListener("hashchange", handler);
  }, []);

  if (!checked) return null;
  if (!user) return <AccessDenied />;
  return <Dashboard user={user} onLogout={() => { window.location.hash = ""; setUser(null); }} />;
}

function Dashboard({ user, onLogout }) {
  const role = user.role; // admin | editor | viewer
  const canEdit = role === "admin" || role === "editor";
  const isAdmin = role === "admin";

  const [cars, setCars] = useState([]);
  const [locations, setLocations] = useState(DEFAULT_LOCATIONS);
  const [view, setView] = useState("list");
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("Todos");
  const [filterLoc, setFilterLoc] = useState("Todos");
  const [showInactive, setShowInactive] = useState(false);
  const [selectedCar, setSelectedCar] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editingCar, setEditingCar] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showUsers, setShowUsers] = useState(false);
  const [mobileMenu, setMobileMenu] = useState(false);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => { Promise.all([loadCars(), loadLocations()]).then(([c, l]) => { setCars(c); setLocations(l); setLoaded(true); }); }, []);
  // Data is saved per-operation to Supabase

  const activeCars = useMemo(() => showInactive ? cars : cars.filter(c => c.status !== "Inativo"), [cars, showInactive]);
  const filtered = useMemo(() => activeCars.filter(c => {
    const q = search.toLowerCase();
    const ms = !q || c.model.toLowerCase().includes(q) || c.plate.toLowerCase().includes(q) || c.borrower?.toLowerCase().includes(q);
    return ms && (filterStatus === "Todos" || c.status === filterStatus) && (filterLoc === "Todos" || c.location === filterLoc);
  }), [activeCars, search, filterStatus, filterLoc]);

  const stats = useMemo(() => {
    const active = cars.filter(c => c.status !== "Inativo");
    const total = active.length; const free = active.filter(c => c.status === "Livre").length;
    const busy = active.filter(c => c.status === "Emprestado").length;
    const inactive = cars.filter(c => c.status === "Inativo").length;
    const avgKm = total > 0 ? Math.round(active.reduce((a, c) => a + (c.km || 0), 0) / total) : 0;
    const byLoc = {}; active.forEach(c => { byLoc[c.location] = (byLoc[c.location] || 0) + 1; });
    const byModel = {}; active.forEach(c => { byModel[c.model] = (byModel[c.model] || 0) + 1; });
    const totalLoans = cars.reduce((a, c) => a + (c.history?.length || 0), 0);
    const maintAlerts = active.filter(c => getMaintenanceStatus(c)).length;
    // Last month occupancy: average per car
    const now = new Date();
    const lmYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
    const lmMonth = now.getMonth() === 0 ? 12 : now.getMonth(); // 1-12
    const lmDays = new Date(lmYear, lmMonth, 0).getDate();
    const lmStart = new Date(lmYear, lmMonth - 1, 1);
    const lmEnd = new Date(lmYear, lmMonth - 1, lmDays);
    const lmLabel = MN[lmMonth - 1] + " " + lmYear;
    let lmPerCar = [];
    active.forEach(car => {
      let carDays = 0;
      (car.history || []).forEach(h => {
        const hs = new Date(h.start); const he = new Date(h.end || h.start);
        const overlapStart = hs > lmStart ? hs : lmStart;
        const overlapEnd = he < lmEnd ? he : lmEnd;
        if (overlapStart <= overlapEnd) {
          carDays += Math.ceil((overlapEnd - overlapStart) / 86400000) + 1;
        }
      });
      lmPerCar.push(Math.min(carDays, lmDays)); // cap at max days in month
    });
    const lmAvgDays = total > 0 ? Math.round((lmPerCar.reduce((a, b) => a + b, 0) / total) * 10) / 10 : 0;
    const lmRate = lmDays > 0 ? Math.round((lmAvgDays / lmDays) * 100) : 0;
    return { total, free, busy, inactive, avgKm, byLoc, byModel, totalLoans, maintAlerts, lmRate, lmLabel, lmAvgDays, lmDaysInMonth: lmDays };
  }, [cars]);

  const handleStatClick = (s) => setFilterStatus(p => p === s ? "Todos" : s);

  const dismissMaint = (carId) => {
    setCars(p => p.map(c => { if (c.id === carId) { const updated = { ...c, maintDismissedAtKm: c.km }; saveCar(updated); return updated; } return c; }));
  };

  if (!loaded) return <div style={{ minHeight: "100vh", background: T.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: font, color: T.textMuted }}>A carregar...</div>;
  if (selectedCar) { const car = cars.find(c => c.id === selectedCar); if (!car) { setSelectedCar(null); return null; } return <CarDetail car={car} onBack={() => setSelectedCar(null)} canEdit={canEdit} onDismissMaint={() => dismissMaint(car.id)} />; }
  if (showUsers && isAdmin) return <AccessLinksView onBack={() => setShowUsers(false)} />;
  if (showSettings && isAdmin) return <SettingsView locations={locations} setLocations={setLocations} onBack={() => setShowSettings(false)} cars={cars} setCars={setCars} />;
  if (showImport && isAdmin) return <ImportView locations={locations} setLocations={setLocations} cars={cars} setCars={setCars} onBack={() => setShowImport(false)} />;
  if (showForm && canEdit) return <CarForm car={editingCar} locations={locations} onSave={async d => { if (editingCar) { await saveCar({...editingCar, ...d}); setCars(p => p.map(c => c.id === editingCar.id ? { ...c, ...d } : c)); } else { const newId = await saveCar({id: 0, ...d}); if (newId) setCars(p => [...p, { ...d, id: newId, history: [] }]); } setShowForm(false); setEditingCar(null); }} onCancel={() => { setShowForm(false); setEditingCar(null); }} />;

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: font }}>
      <style>{`
        @media (max-width: 768px) {
          .hpi-header { padding: 14px 16px !important; }
          .hpi-header-actions { display: none !important; }
          .hpi-header-actions.open { display: flex !important; flex-direction: column; width: 100%; padding-top: 12px; border-top: 1px solid ${T.border}; margin-top: 12px; }
          .hpi-mobile-toggle { display: flex !important; }
          .hpi-stats { padding: 12px 16px !important; }
          .hpi-stats > div { min-width: calc(50% - 8px) !important; flex: 1 1 calc(50% - 8px) !important; }
          .hpi-toolbar { padding: 0 16px 12px !important; }
          .hpi-content { padding: 0 16px 30px !important; }
          .hpi-list-grid { grid-template-columns: 2fr 1fr auto !important; }
          .hpi-list-header { grid-template-columns: 2fr 1fr auto !important; }
          .hpi-list-hide-mobile { display: none !important; }
          .hpi-logo { width: 110px !important; }
          .hpi-subtitle-sep { display: none !important; }
          .hpi-subtitle-text { font-size: 12px !important; }
          .hpi-subtitle-sub { display: none !important; }
        }
      `}</style>
      <div className="hpi-header" style={{ padding: "16px 28px", borderBottom: `1px solid ${T.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <HyundaiLogo width={130} />
          <div className="hpi-subtitle-sep" style={{ width: 1, height: 28, background: T.border }} />
          <div>
            <div className="hpi-subtitle-text" style={{ fontSize: 14, fontWeight: 600, color: T.text }}>Parque de Imprensa</div>
            <div className="hpi-subtitle-sub" style={{ fontSize: 11, color: T.textMuted }}>Gestão de Frota</div>
          </div>
        </div>
        <button className="hpi-mobile-toggle" onClick={() => setMobileMenu(p => !p)} style={{ display: "none", alignItems: "center", justifyContent: "center", width: 36, height: 36, borderRadius: 8, border: `1px solid ${T.border}`, background: "none", cursor: "pointer", color: T.textMuted, fontSize: 18 }}>☰</button>
        <div className={`hpi-header-actions${mobileMenu ? " open" : ""}`} style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: T.textMuted, padding: "5px 10px", background: "rgba(255,255,255,0.03)", borderRadius: 6, border: `1px solid ${T.border}` }}>
            <Icon d={Icons.user} size={13} color={role === "admin" ? T.danger : role === "editor" ? T.accent : T.textMuted} />
            {user.name} <span style={{ fontSize: 10, opacity: 0.6 }}>({ROLES[role]})</span>

          {isAdmin && <Btn onClick={() => setShowUsers(true)}><Icon d={Icons.users} size={14} color={T.textMuted} /> Links de Acesso</Btn>}
          {isAdmin && <Btn onClick={() => setShowImport(true)}><Icon d={Icons.upload} size={14} color={T.textMuted} /> Importar</Btn>}
          {isAdmin && <Btn onClick={() => setShowSettings(true)}><Icon d={Icons.settings} size={14} color={T.textMuted} /> Definições</Btn>}
          {canEdit && <Btn onClick={() => { setEditingCar(null); setShowForm(true); }} style={{ background: T.accent, color: "#fff", border: "none" }}><Icon d={Icons.plus} size={14} color="#fff" /> Nova Viatura</Btn>}
          <Btn onClick={onLogout}><Icon d={Icons.logout} size={14} color={T.textMuted} /></Btn>
        </div>
      </div>

      <div className="hpi-stats" style={{ padding: "20px 28px", display: "flex", gap: 12, flexWrap: "wrap" }}>
        <StatCard label="Ativas" value={stats.total} sub={`${stats.free} livres`} icon={Icons.car} onClick={() => { setFilterStatus("Todos"); setShowInactive(false); }} active={filterStatus === "Todos" && !showInactive} />

    </div>
  );

// ═══ GRID ═══
function GridView({ cars, onSelect, onEdit }) {
  if (cars.length === 0) return <Empty />;
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
      {cars.map(car => {
        const maint = getMaintenanceStatus(car);
        const isInactive = car.status === "Inativo";
        return (

            {car.status === "Emprestado" && car.borrower && <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${T.border}`, fontSize: 12, color: T.busy }}><span style={{ fontWeight: 600 }}>{car.borrower}</span><div style={{ color: T.textDim, marginTop: 2 }}>{fmtD(car.borrowStart)} → {fmtD(car.borrowEnd)}</div></div>}

      })}
    </div>
  );
}

            </div>
          ); })}</div>
        )}
      </div>
    </div>
  );
}

// ═══ STATS ═══
function calcOcc(cars) {
  const md = {}, yd = {};
  cars.filter(c => c.status !== "Inativo").forEach(car => (car.history || []).forEach(h => { const s = new Date(h.start); const e = h.end ? new Date(h.end) : new Date(); const c2 = new Date(s); while (c2 <= e) { const ym = `${c2.getFullYear()}-${String(c2.getMonth() + 1).padStart(2, "0")}`; md[ym] = (md[ym] || 0) + 1; yd[`${c2.getFullYear()}`] = (yd[`${c2.getFullYear()}`] || 0) + 1; c2.setDate(c2.getDate() + 1); } }));
  const am = new Set(), ay = new Set();
  cars.filter(c => c.status !== "Inativo").forEach(car => (car.history || []).forEach(h => { const s = new Date(h.start); const e = h.end ? new Date(h.end) : new Date(); const c2 = new Date(s.getFullYear(), s.getMonth(), 1); while (c2 <= e) { am.add(`${c2.getFullYear()}-${String(c2.getMonth() + 1).padStart(2, "0")}`); ay.add(`${c2.getFullYear()}`); c2.setMonth(c2.getMonth() + 1); } }));
  const nc = cars.filter(c => c.status !== "Inativo").length || 1;
  const monthly = [...am].sort().map(ym => { const [y, m] = ym.split("-").map(Number); const d = new Date(y, m, 0).getDate(); const tp = nc * d; const o = md[ym] || 0; return { key: ym, label: `${MN[m - 1]} ${y}`, rate: Math.round(o / tp * 100), occupied: o }; });
  const yearly = [...ay].sort().map(y => { const yn = Number(y); const now = new Date(); let ed = ((yn % 4 === 0 && yn % 100 !== 0) || yn % 400 === 0) ? 366 : 365; if (yn === now.getFullYear()) ed = Math.ceil((now - new Date(yn, 0, 1)) / 86400000) + 1; const tp = nc * ed; const o = yd[y] || 0; return { key: y, label: y, rate: Math.round(o / tp * 100), occupied: o }; });
  return { monthly, yearly };
}
function StatsView({ stats, cars }) {
  const [tab, setTab] = useState("monthly");
  const active = cars.filter(c => c.status !== "Inativo");
  const me = Object.entries(stats.byModel).sort((a, b) => b[1] - a[1]);
  const le = Object.entries(stats.byLoc).sort((a, b) => b[1] - a[1]);
  const mm = Math.max(...me.map(e => e[1]), 1);
  const topKm = [...active].sort((a, b) => (b.km || 0) - (a.km || 0)).slice(0, 5);
  const occ = useMemo(() => calcOcc(cars), [cars]);
  const od = tab === "monthly" ? occ.monthly : occ.yearly;
  const mr = Math.max(...od.map(d => d.rate), 1);
  const bc = (r) => r >= 30 ? "#22c55e" : r >= 15 ? T.accent : r >= 5 ? T.busy : T.textDim;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: 24 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
          <div><h3 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>Taxa de Ocupação</h3><p style={{ fontSize: 12, color: T.textMuted, margin: "4px 0 0" }}>% de dias com viaturas emprestadas (exclui inativas)</p></div>
          <div style={{ display: "flex", gap: 4 }}><Btn small active={tab === "monthly"} onClick={() => setTab("monthly")}>Mensal</Btn><Btn small active={tab === "yearly"} onClick={() => setTab("yearly")}>Anual</Btn></div>
        </div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: tab === "yearly" ? 20 : 6, height: 200, overflowX: "auto" }}>
          {od.map(d => (<div key={d.key} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flex: tab === "yearly" ? "0 0 80px" : 1, minWidth: tab === "monthly" ? 36 : 60 }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: bc(d.rate) }}>{d.rate}%</span>
            <div style={{ width: "100%", maxWidth: tab === "yearly" ? 60 : 40, height: `${Math.max((d.rate / Math.max(mr, 50)) * 150, 4)}px`, background: `linear-gradient(180deg, ${bc(d.rate)}, ${bc(d.rate)}66)`, borderRadius: "4px 4px 0 0" }} />
            <span style={{ fontSize: tab === "monthly" ? 10 : 12, color: T.textMuted, writingMode: tab === "monthly" ? "vertical-rl" : "horizontal-tb", transform: tab === "monthly" ? "rotate(180deg)" : "none", height: tab === "monthly" ? 50 : "auto" }}>{d.label}</span>
          </div>))}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 16 }}>
        <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: 24 }}>
          <h3 style={{ fontSize: 14, fontWeight: 600, margin: "0 0 18px" }}>Viaturas por Modelo</h3>
          {me.map(([m, c]) => <div key={m} style={{ marginBottom: 10 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ fontSize: 13 }}>{m}</span><span style={{ fontSize: 13, fontWeight: 600, color: T.accent }}>{c}</span></div><div style={{ height: 6, background: "rgba(255,255,255,0.04)", borderRadius: 3, overflow: "hidden" }}><div style={{ height: "100%", width: `${(c / mm) * 100}%`, background: T.accent, borderRadius: 3 }} /></div></div>)}
        </div>
        <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: 24 }}>
          <h3 style={{ fontSize: 14, fontWeight: 600, margin: "0 0 18px" }}>Top 5 — Mais Km</h3>
          {topKm.map((c, i) => <div key={c.id} style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}><div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 12, fontWeight: 700, color: T.textDim, width: 18 }}>{i + 1}</span><span style={{ fontSize: 13 }}>{c.model}</span></div><span style={{ fontSize: 13, fontWeight: 600, color: "#8b5cf6", fontFamily: fontMono }}>{(c.km || 0).toLocaleString("pt-PT")} km</span></div>)}
        </div>
      </div>
      <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: 24 }}>
        <h3 style={{ fontSize: 14, fontWeight: 600, margin: "0 0 12px" }}>Resumo</h3>

// ═══ IMPORT ═══
function ImportView({ locations, setLocations, cars, setCars, onBack }) {
  const [csv, setCsv] = useState("");
  const [step, setStep] = useState(1); // 1=input, 2=preview, 3=done
  const [parsed, setParsed] = useState(null); // { cars: [...], totalLoans, months }
  const [mode, setMode] = useState("merge");
  const [error, setError] = useState("");
  const fRef = useRef(null);

  // Portuguese month names to number
  const MONTH_MAP = { janeiro: 0, fevereiro: 1, "março": 2, marco: 2, abril: 3, maio: 4, junho: 5, julho: 6, agosto: 7, setembro: 8, outubro: 9, novembro: 10, dezembro: 11, jan: 0, fev: 1, mar: 2, abr: 3, mai: 4, jun: 5, jul: 6, ago: 7, set: 8, out: 9, nov: 10, dez: 11, january: 0, february: 1, march: 2, april: 3, may: 4, june: 5, july: 6, august: 7, september: 8, october: 9, november: 10, december: 11 };

  const parseSheet = () => {
    setError("");
    try {
      const lines = csv.split("\n");
      if (lines.length < 4) { setError("O ficheiro precisa de pelo menos 4 linhas (2 de cabeçalho + 1 de campos + dados)."); return; }

      // Detect separator
      const sep = lines[0].includes("\t") ? "\t" : lines[0].includes(";") ? ";" : ",";
      const splitLine = (line) => {
        const v = []; let cur = ""; let inQ = false;
        for (const ch of line) { if (ch === '"') inQ = !inQ; else if (ch === sep && !inQ) { v.push(cur); cur = ""; } else cur += ch; }
        v.push(cur); return v.map(x => x.trim().replace(/^["']|["']$/g, "").trim());
      };

      // Parse all lines
      const allRows = lines.map(l => splitLine(l));

      // Find the header row (row with "Matrícula" or "matrículas" or "MATRÍCULA" in first cols)
      let headerRowIdx = -1;
      for (let i = 0; i < Math.min(allRows.length, 6); i++) {
        const row = allRows[i];
        const joined = row.slice(0, 8).join(" ").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if (joined.includes("matricula") || joined.includes("modelo") || joined.includes("km")) {
          headerRowIdx = i; break;
        }
      }
      if (headerRowIdx === -1) { setError("Não encontrei a linha de cabeçalhos (Matrícula, KM, Modelo...)."); return; }

      const headers = allRows[headerRowIdx].map(h => h.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));

      // Identify fixed columns
      const findCol = (patterns) => headers.findIndex(h => patterns.some(p => h.includes(p)));
      const colPlate = findCol(["matricula"]);
      const colKm = findCol(["km"]);
      const colModel = findCol(["modelo"]);
      const colColor = findCol(["cor", "ext"]);
      const colVin = findCol(["vin"]);
      const colLoc = findCol(["pi", "localiza", "parque", "local"]);

      if (colPlate === -1 && colModel === -1) { setError("Não encontrei as colunas de Matrícula ou Modelo."); return; }

      // Find where the calendar starts - scan rows above headerRowIdx for month names
      // The month header row typically has merged cells with "agosto 2020" etc.
      let calendarStartCol = -1;
      let monthDateMap = {}; // colIndex -> Date

      // Scan the rows above the header for month names
      for (let scanRow = 0; scanRow < headerRowIdx; scanRow++) {
        const row = allRows[scanRow];
        for (let c = 8; c < row.length; c++) {
          const cell = (row[c] || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          if (!cell) continue;
          // Match "month year" pattern
          const parts = cell.split(/\s+/);
          if (parts.length >= 2) {
            const monthName = parts[0];
            const year = parseInt(parts[parts.length - 1]);
            if (MONTH_MAP[monthName] !== undefined && year >= 2018 && year <= 2030) {
              if (calendarStartCol === -1 || c < calendarStartCol) calendarStartCol = c;
              // This column starts this month
              monthDateMap[c] = { month: MONTH_MAP[monthName], year };
            }
          }
        }
      }

      // Also check the header row itself for day numbers or day-of-week patterns
      const headerRow = allRows[headerRowIdx];

      // Build the date for each column
      // The day numbers should be in the header row (or the row below the month row)
      // We need to find day numbers - they might be in the header row or a row between month headers and data
      let dayRow = allRows[headerRowIdx]; // Try header row first
      // Check if there's a row with just numbers (days) between month headers and data
      for (let r = 0; r <= headerRowIdx; r++) {
        const row = allRows[r];
        let numCount = 0;
        for (let c = calendarStartCol; c < Math.min(row.length, calendarStartCol + 40); c++) {
          const val = (row[c] || "").trim();
          if (/^[0-9]{1,2}$/.test(val) && parseInt(val) >= 1 && parseInt(val) <= 31) numCount++;
        }
        if (numCount >= 5) { dayRow = row; break; }
      }

      // Build column -> date mapping
      const colDateMap = {}; // colIndex -> "YYYY-MM-DD"
      if (calendarStartCol >= 0) {
        // Get sorted month start columns
        const monthStarts = Object.entries(monthDateMap).map(([c, d]) => ({ col: parseInt(c), ...d })).sort((a, b) => a.col - b.col);

        for (let c = calendarStartCol; c < Math.max(headerRow.length, dayRow.length); c++) {
          const dayVal = (dayRow[c] || "").trim();
          // Find which month this column belongs to
          let monthInfo = null;
          for (let m = monthStarts.length - 1; m >= 0; m--) {
            if (c >= monthStarts[m].col) { monthInfo = monthStarts[m]; break; }
          }
          if (!monthInfo) continue;

          let day = 0;
          // Try to parse day from the day row
          if (/^[0-9]{1,2}$/.test(dayVal)) {
            day = parseInt(dayVal);
          } else {
            // Calculate day from position relative to month start
            // Each month has day columns - figure out offset
            const offset = c - monthInfo.col;
            // The columns often have day-of-week labels (3ª, 4ª, 5ª, 6ª, S, D) interspersed
            // Look at the actual day row content nearby to figure out the day
            // For now, try to extract from the header row
            const altVal = (headerRow[c] || "").trim();
            if (/^[0-9]{1,2}$/.test(altVal)) day = parseInt(altVal);
          }

          if (day >= 1 && day <= 31) {
            const dateStr = `${monthInfo.year}-${String(monthInfo.month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
            // Validate the date
            const testDate = new Date(dateStr);
            if (!isNaN(testDate.getTime())) {
              colDateMap[c] = dateStr;
            }
          }
        }
      }

      const totalCalendarCols = Object.keys(colDateMap).length;

      // Parse car rows (everything after the header row)
      const dataRows = allRows.slice(headerRowIdx + 1);
      const importedCars = [];
      let totalLoans = 0;

      for (const row of dataRows) {
        const plate = (row[colPlate] || "").trim().toUpperCase();
        const model = colModel >= 0 ? (row[colModel] || "").trim() : "";
        if (!plate && !model) continue; // Skip empty rows
        if (!model) continue; // Need at least a model

        const km = colKm >= 0 ? parseInt((row[colKm] || "").replace(/[^\d]/g, "")) || 0 : 0;
        const colorRaw = colColor >= 0 ? (row[colColor] || "").trim() : "";
        const vin = colVin >= 0 ? (row[colVin] || "").trim() : "";
        const loc = colLoc >= 0 ? (row[colLoc] || "").trim() : "";

        // Parse calendar for this car
        const history = [];
        let currentBorrower = null;
        let currentStart = null;
        let lastDate = null;

        // Sort columns by date
        const sortedCols = Object.entries(colDateMap).sort((a, b) => a[1].localeCompare(b[1]));

        for (const [colStr, dateStr] of sortedCols) {
          const c = parseInt(colStr);
          const cellValue = (row[c] || "").trim();

          if (cellValue && cellValue.length > 0) {
            // This day has a borrower
            if (currentBorrower === null) {
              // Start new loan
              currentBorrower = cellValue;
              currentStart = dateStr;
            } else if (cellValue !== currentBorrower) {
              // Different borrower - close previous, start new
              history.push({ borrower: currentBorrower, start: currentStart, end: lastDate || currentStart, kmStart: null, kmEnd: null });
              totalLoans++;
              currentBorrower = cellValue;
              currentStart = dateStr;
            }
            lastDate = dateStr;
          } else {
            // Empty cell - close current loan if any
            if (currentBorrower !== null) {
              history.push({ borrower: currentBorrower, start: currentStart, end: lastDate || currentStart, kmStart: null, kmEnd: null });
              totalLoans++;
              currentBorrower = null;
              currentStart = null;
              lastDate = null;
            }
          }
        }
        // Close last open loan
        if (currentBorrower !== null) {
          history.push({ borrower: currentBorrower, start: currentStart, end: lastDate || currentStart, kmStart: null, kmEnd: null });
          totalLoans++;
        }

        // Determine status: if plate matches an active car, it stays active; otherwise Inativo
        const activePlates = new Set(cars.filter(c => c.status !== "Inativo").map(c => c.plate.toUpperCase()));
        const isActiveCar = plate && activePlates.has(plate);
        const lastLoan = history.length > 0 ? history[history.length - 1] : null;
        const today = new Date().toISOString().split("T")[0];
        const isCurrentlyBorrowed = lastLoan && lastLoan.end >= today;
        const status = isActiveCar ? (isCurrentlyBorrowed ? "Emprestado" : "Livre") : "Inativo";

        // Add location
        if (loc && !locations.includes(loc)) {
          setLocations(p => p.includes(loc) ? p : [...p, loc]);
        }

        importedCars.push({
          id: Date.now() + importedCars.length,
          model, plate: plate || "SEM-MATRICULA", vin, km,
          colorExt: colorRaw || "—", colorInt: "—",
          location: loc || (isActiveCar ? "" : ""),
          status,
          fuel: model.toLowerCase().includes("ev ") || model.toLowerCase().includes("elétric") || model.toLowerCase().includes("electric") || model.toLowerCase().includes(" ev") || model.toLowerCase().includes("66kwh") || model.toLowerCase().includes("49kwh") || model.toLowerCase().includes("84kwh") ? "Elétrico" :
                model.toLowerCase().includes("hev") || model.toLowerCase().includes("phev") || model.toLowerCase().includes("híbrid") ? (model.toLowerCase().includes("phev") ? "Híbrido Plug-in" : "Híbrido") :
                model.toLowerCase().includes("t-gdi") || model.toLowerCase().includes("tgdi") || model.toLowerCase().includes("gdi") ? "Gasolina" :
                model.toLowerCase().includes("crdi") || model.toLowerCase().includes("diesel") ? "Diesel" : "Elétrico",
          registrationDate: "",
          lastServiceKm: 0,
          borrower: (isActiveCar && isCurrentlyBorrowed) ? lastLoan.borrower : "",
          borrowStart: (isActiveCar && isCurrentlyBorrowed) ? lastLoan.start : "",
          borrowEnd: (isActiveCar && isCurrentlyBorrowed) ? lastLoan.end : "",
          inactiveDate: !isActiveCar && history.length > 0 ? history[history.length - 1].end : "",
          inactiveReason: !isActiveCar ? "Saiu do parque de imprensa" : "",
          history,
        });
      }

      // Get unique months found
      const monthsList = [...new Set(Object.values(colDateMap).map(d => d.substring(0, 7)))].sort();

      setParsed({ cars: importedCars, totalLoans, months: monthsList, totalCalendarCols });
      setStep(2);
    } catch (e) {
      setError(`Erro ao processar: ${e.message}`);
    }
  };

  const doImport = () => {
    if (!parsed) return;
    if (mode === "replace") {
      setCars(parsed.cars);
    } else {
      setCars(prev => {
        const existing = new Map(prev.map(c => [c.plate.toUpperCase(), c]));
        parsed.cars.forEach(nc => {
          const k = nc.plate.toUpperCase();
          if (existing.has(k)) {
            const old = existing.get(k);
            // Merge histories, keeping existing car's base data and status
            const mergedHistory = [...(old.history || [])];
            (nc.history || []).forEach(newLoan => {
              const isDuplicate = mergedHistory.some(h => h.start === newLoan.start && h.borrower === newLoan.borrower);
              if (!isDuplicate) mergedHistory.push(newLoan);
            });
            mergedHistory.sort((a, b) => a.start.localeCompare(b.start));
            // Keep the active car's status, location, km etc — only add history
            existing.set(k, { ...old, history: mergedHistory });
          } else {
            // New car from import — add as-is (will be Inativo if not in active list)
            existing.set(k, nc);
          }
        });
        return [...existing.values()];
      });
    }
    setStep(3);
  };

  // ── Step 3: Done ──
  if (step === 3) return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: font, padding: "24px 28px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
      <div style={{ width: 64, height: 64, borderRadius: "50%", background: T.freeSoft, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon d={Icons.check} size={32} color={T.free} /></div>
      <h2 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>Importação concluída!</h2>
      <p style={{ fontSize: 13, color: T.textMuted, textAlign: "center" }}>{parsed?.cars.length} viaturas importadas com {parsed?.totalLoans} empréstimos no histórico.</p>
      <Btn onClick={onBack} style={{ background: T.accent, color: "#fff", border: "none", marginTop: 8 }}>Voltar à lista</Btn>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: font, padding: "24px 28px" }}>
      <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 8, background: "none", border: "none", color: T.textMuted, fontSize: 13, cursor: "pointer", fontFamily: font, marginBottom: 24, padding: 0 }}><Icon d={Icons.back} size={16} color={T.textMuted} /> Voltar</button>
      <h1 style={{ fontSize: 22, fontWeight: 700, margin: "0 0 8px" }}>Importar do Google Sheets</h1>
      <p style={{ fontSize: 13, color: T.textMuted, margin: "0 0 24px", lineHeight: 1.6 }}>
        Este importador lê a estrutura do vosso sheet com o calendário de ocupação. Exporte como CSV (Ficheiro → Transferir → CSV) ou copie e cole todo o conteúdo.
      </p>

      {/* Step 1: Input */}
      {step === 1 && (
        <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: 24 }}>
          <h2 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 6px" }}>1. Colar ou carregar o ficheiro</h2>
          <p style={{ fontSize: 12, color: T.textMuted, margin: "0 0 16px" }}>O importador reconhece automaticamente: colunas fixas (Matrícula, KM, Modelo, Cor, VIN, Localização) e o calendário com os meses e dias à direita.</p>

          <div style={{ marginBottom: 14 }}>
            <input type="file" accept=".csv,.tsv,.txt" ref={fRef} onChange={e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => setCsv(ev.target.result); r.readAsText(f); } }} style={{ display: "none" }} />
            <Btn onClick={() => fRef.current?.click()}><Icon d={Icons.upload} size={14} color={T.textMuted} /> Carregar ficheiro CSV</Btn>
            {csv && <span style={{ fontSize: 12, color: T.free, marginLeft: 12 }}>✓ {csv.split("\n").length} linhas carregadas</span>}
          </div>

          <textarea value={csv} onChange={e => setCsv(e.target.value)} placeholder={"Cole aqui todo o conteúdo do Google Sheet (Ctrl+A, Ctrl+C no sheet, depois Ctrl+V aqui)...\n\nOu exporte como CSV: Ficheiro → Transferir → Valores separados por vírgulas (.csv)"} rows={8} style={{ width: "100%", boxSizing: "border-box", background: T.bg, border: `1px solid ${T.border}`, borderRadius: 8, padding: 12, color: T.text, fontSize: 12, fontFamily: fontMono, outline: "none", resize: "vertical" }} />

          {error && <div style={{ marginTop: 12, padding: "12px 16px", borderRadius: 8, background: T.dangerSoft, border: `1px solid ${T.dangerBorder}`, fontSize: 13, color: T.danger }}>{error}</div>}

          <div style={{ marginTop: 16 }}>
            <button onClick={parseSheet} disabled={!csv.trim()} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: csv.trim() ? T.accent : T.textDim, color: "#fff", fontSize: 14, fontWeight: 600, cursor: csv.trim() ? "pointer" : "not-allowed", fontFamily: font }}>Analisar dados</button>
          </div>
        </div>
      )}

      {/* Step 2: Preview */}
      {step === 2 && parsed && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Summary */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: 24 }}>
            <h2 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 16px" }}>2. Pré-visualização</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 20 }}>
              <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 10, padding: "14px 16px", border: `1px solid ${T.border}` }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: T.accent }}>{parsed.cars.length}</div>
                <div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.6, marginTop: 4 }}>Viaturas</div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 10, padding: "14px 16px", border: `1px solid ${T.border}` }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: T.busy }}>{parsed.totalLoans}</div>
                <div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.6, marginTop: 4 }}>Empréstimos</div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 10, padding: "14px 16px", border: `1px solid ${T.border}` }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: T.free }}>{parsed.totalCalendarCols}</div>
                <div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.6, marginTop: 4 }}>Dias mapeados</div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 10, padding: "14px 16px", border: `1px solid ${T.border}` }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: T.text }}>{parsed.months.length}</div>
                <div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.6, marginTop: 4 }}>Meses</div>
              </div>
            </div>

            {parsed.months.length > 0 && (
              <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 16 }}>
                Período: <strong style={{ color: T.text }}>{parsed.months[0]}</strong> → <strong style={{ color: T.text }}>{parsed.months[parsed.months.length - 1]}</strong>
              </div>
            )}

            {/* Car list preview */}
            <div style={{ maxHeight: 350, overflowY: "auto", border: `1px solid ${T.border}`, borderRadius: 10 }}>
              {parsed.cars.map((car, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", borderBottom: `1px solid ${T.border}` }}>
                  <div style={{ width: 30, height: 30, borderRadius: 8, background: statusSoft(car.status), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <Icon d={Icons.car} size={15} color={statusColor(car.status)} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{car.model}</div>
                    <div style={{ fontSize: 11, color: T.textMuted, fontFamily: fontMono }}>{car.plate}</div>
                  </div>
                  <div style={{ fontSize: 11, color: T.textMuted, textAlign: "right" }}>{car.location}</div>
                  <div style={{ fontSize: 11, color: T.textMuted, fontFamily: fontMono, textAlign: "right", minWidth: 50 }}>{car.km > 0 ? car.km.toLocaleString("pt-PT") : "—"}</div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.accent, minWidth: 80, textAlign: "right" }}>{car.history.length} emprést.</div>
                </div>
              ))}
            </div>
          </div>

          {/* Import options */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, padding: 24 }}>
            <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: T.textMuted }}>Modo de importação:</span>
              <Btn small active={mode === "replace"} onClick={() => setMode("replace")}>Substituir tudo</Btn>
              <Btn small active={mode === "merge"} onClick={() => setMode("merge")}>Juntar (por matrícula)</Btn>
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <Btn onClick={() => { setStep(1); setParsed(null); }}>← Voltar</Btn>
              <button onClick={doImport} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: T.accent, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font }}>
                Importar {parsed.cars.length} viaturas com {parsed.totalLoans} empréstimos
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Empty() { return <div style={{ textAlign: "center", padding: "60px 20px", color: T.textDim }}><Icon d={Icons.car} size={40} color={T.textDim} style={{ margin: "0 auto 16px", display: "block" }} /><div style={{ fontSize: 14 }}>Nenhuma viatura encontrada.</div></div>; }


ReactDOM.render(React.createElement(App), document.getElementById('root'));

  </script>
</body>
</html>
